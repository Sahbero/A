<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hansa Mimarlık</title>
  <style>
    /* Temel renk ve font ayarları (Apple Core Palette ve San Francisco fontu) */
    :root {
      --color-primary: #0066CC; /* Science Blue */
      --color-dark: #1D1D1F;    /* Shark Black */
      --color-light: #F5F5F7;   /* Athens Gray */
      --color-white: #FFFFFF;  
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: var(--color-white);
      color: var(--color-dark);
      line-height: 1.6;
      overflow-x: hidden;
    }
    a { color: var(--color-primary); text-decoration: none; transition: opacity 0.3s ease; }
    a:hover { opacity: 0.7; }

    /* Navigasyon */
    header {
      position: sticky; top: 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      z-index: 100;
      padding: 1rem 2rem;
    }
    nav ul { display: flex; gap: 2rem; list-style: none; }
    nav ul li { font-weight: 500; }

    /* Kahraman bölümü */
    .hero {
      position: relative;
      height: 90vh;
      background: url('hero.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .hero h1 {
      font-size: 4rem;
      color: var(--color-white);
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      animation: fadeInDown 1s ease-out;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Proje galerisi */
    .projects {
      padding: 4rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }
    .project {
      position: relative;
      overflow: hidden;
    }
    .project img {
      width: 100%; display: block;
      transition: transform 0.5s ease;
    }
    .project:hover img { transform: scale(1.05); }
    .project .info {
      position: absolute; bottom: 1rem; left: 1rem;
      background: rgba(0,0,0,0.6); color: #fff;
      padding: 0.5rem 1rem; border-radius: 0.25rem;
      opacity: 0; transition: opacity 0.4s ease;
    }
    .project:hover .info { opacity: 1; }

    /* Footer */
    footer {
      background: var(--color-light);
      padding: 2rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--color-dark);
    }

    /* Scroll ile görünürlük animasyonu */
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="#hero">Ana Sayfa</a></li>
        <li><a href="#projects">Projeler</a></li>
        <li><a href="#contact">İletişim</a></li>
      </ul>
    </nav>
  </header>

  <section id="hero" class="hero">
    <h1>Hansa Mimarlık</h1>
  </section>

  <section id="projects" class="projects">
    <div class="project fade-in"><img src="proj1.jpg" alt="Proje 1"><div class="info">Proje 1</div></div>
    <div class="project fade-in"><img src="proj2.jpg" alt="Proje 2"><div class="info">Proje 2</div></div>
    <div class="project fade-in"><img src="proj3.jpg" alt="Proje 3"><div class="info">Proje 3</div></div>
    <div class="project fade-in"><img src="proj4.jpg" alt="Proje 4"><div class="info">Proje 4</div></div>
  </section>

  <footer id="contact">
    <p>&copy; 2025 Hansa Mimarlık. Tüm hakları saklıdır.</p>
    <p>İletişim: info@hansamimarlik.com | +90 212 123 45 67</p>
  </footer>

  <script>
    // Scroll animasyonu için IntersectionObserver
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.15 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
</html>
